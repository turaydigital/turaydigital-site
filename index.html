<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Turay Digital</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      padding: 24px 8%;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
    }

    nav a {
      color: #cbd5e1;
      text-decoration: none;
      margin-left: 20px;
    }

    .hero {
      min-height: 80vh;
      display: flex;
      align-items: center;
      padding: 0 8%;
    }

    .hero-content {
      max-width: 650px;
    }

    h1 {
      font-size: 56px;
      margin-bottom: 16px;
    }

    p {
      font-size: 20px;
      color: #cbd5e1;
      line-height: 1.6;
    }

    .button {
      display: inline-block;
      margin-top: 24px;
      padding: 14px 24px;
      background: #2563eb;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;
    }

    .tag {
      color: #60a5fa;
      font-weight: bold;
      margin-bottom: 12px;
    }
  </style>
</head>

<body>
  <header>
    <div class="logo">Turay Digital</div>

    <nav>
      <a href="#services">Services</a>
      <a href="#apps">Apps</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <section class="hero">
    <div class="hero-content">
      <div class="tag">Digital tools for growing businesses</div>

      <h1>We build simple, powerful software for modern teams.</h1>

      <p>
        Turay Digital creates websites, mobile apps, and cloud-powered systems
        that help businesses manage bookings, users, stores, and operations.
      </p>

      <a href="#contact" class="button">Get in touch</a>
    </div>
  </section>

  <script src="https://cdn.apple-cloudkit.com/ck/2/cloudkit.js"></script>

<script src="cloudkit-config.js"></script>

</body>
</html>
